    known_gaps: [No TIM selection, no pressure map, no flatness tolerance, no aging behavior]
    required_next_evidence: [TIM datasheet, compression and flatness study, heat-flow coupon test]
    risk_if_wrong: Real heat transfer may be much worse than the thermal stack estimate.
    review_priority: critical
  - domain: skin_temperature
