# BuildSlate engineering coverage and maturity registry.
# Status enums: covered, partial, weak, missing.
# Maturity enums: screening, first_order, calibrated, validated.
# Review priority enums: low, medium, high, critical.
entries:
  - domain: battery_energy
    coverage_status: covered
    maturity_level: first_order
    models: [engineering/models/battery_energy.py, engineering/component_models/battery_pack.py]
    data_sources: [engineering/constants/battery.yaml, engineering/provenance/constants_provenance.yaml, specs/slate-pocket-v1.yaml]
    key_assumptions: Battery capacity and usable energy are estimated from declared pack capacity, nominal voltage, discharge reserve, and package efficiency.
    known_gaps: [No supplier cell curve, no measured discharge profile, no aged-cell derating data]
    required_next_evidence: [Cell datasheet with nominal and minimum voltage, prototype runtime discharge logs, reserve and safety derating rationale]
    risk_if_wrong: Runtime and mass targets may be overstated, causing thermal and packaging budgets to look feasible when they are not.
    review_priority: high
  - domain: battery_volume
    coverage_status: partial
    maturity_level: screening
    models: [engineering/component_models/battery_pack.py, engineering/models/component_packaging.py]
    data_sources: [engineering/constants/battery.yaml, engineering/components/component_library.yaml]
    key_assumptions: Volumetric energy density is represented by conservative range constants rather than a selected cell and pack construction.
    known_gaps: [No pouch cell dimensions, no tab and protection-board allowance, no adhesive and enclosure clearance model]
    required_next_evidence: [Candidate cell mechanical drawings, pack CAD envelope, supplier volumetric energy density at target capacity]
    risk_if_wrong: Battery may consume more z-height or area than expected and crowd display, PCB, camera, or thermal paths.
    review_priority: high
  - domain: battery_mass
    coverage_status: partial
    maturity_level: screening
    models: [engineering/models/component_mass_budget.py, engineering/component_models/battery_pack.py]
    data_sources: [engineering/constants/battery.yaml, engineering/components/component_library.yaml]
    key_assumptions: Gravimetric energy density and packaging overhead are estimated from generic ranges.
    known_gaps: [No cell mass from selected vendor, no battery management hardware mass, no adhesive and restraint mass]
    required_next_evidence: [Candidate cell mass, pack assembly mass breakdown, prototype weighed pack]
    risk_if_wrong: Device weight and center-of-mass estimates may be optimistic.
    review_priority: medium
  - domain: battery_swelling
    coverage_status: covered
    maturity_level: first_order
    models: [engineering/manufacturing_models/battery_swelling.py]
    data_sources: [engineering/constants/battery.yaml]
    key_assumptions: Swelling allowance is treated as a required mechanical clearance based on screening factors.
    known_gaps: [No cycle-life swelling curve, no temperature-dependent swelling data, no compression fixture model]
    required_next_evidence: [Cell swelling specification over cycle life, mechanical clearance CAD review, abuse and thermal storage validation plan]
    risk_if_wrong: Swelling may load the display, delaminate adhesive, or compromise enclosure safety.
    review_priority: critical
  - domain: display_geometry
    coverage_status: covered
    maturity_level: first_order
    models: [engineering/component_models/display_module.py, engineering/models/surface_area.py]
    data_sources: [specs/slate-pocket-v1.yaml, engineering/components/component_library.yaml]
    key_assumptions: Display area, aspect ratio, and active module dimensions are derived from target size and geometry.
    known_gaps: [No panel vendor outline drawing, no bezel stack detail, no connector and driver placement]
    required_next_evidence: [Panel mechanical drawing, cover-glass and bezel CAD stack, FPC routing constraints]
    risk_if_wrong: Active display and enclosure dimensions may conflict with usable internal layout.
    review_priority: medium
  - domain: display_power
    coverage_status: partial
    maturity_level: screening
    models: [engineering/component_models/display_module.py, engineering/environment_models/sunlight_display_load.py]
    data_sources: [engineering/components/component_library.yaml, engineering/constants/thermal.yaml]
    key_assumptions: Display load is estimated from coarse brightness and environmental pressure assumptions.
    known_gaps: [No panel power-vs-nits curve, no refresh-rate power curve, no measured sunlight mode behavior]
    required_next_evidence: [Panel electrical datasheet, display power measurements across brightness and refresh rates, sunlight readability target]
    risk_if_wrong: Runtime and thermal budgets may understate display-dominated loads.
    review_priority: high
  - domain: soc_power_density
    coverage_status: covered
    maturity_level: first_order
    models: [engineering/component_models/soc_package.py, engineering/models/thermal_limits.py]
    data_sources: [engineering/constants/compute.yaml, engineering/constants/thermal.yaml]
    key_assumptions: SoC heat flux is estimated from sustained power and package area ranges.
    known_gaps: [No selected SoC package drawing, no measured sustained power, no die hotspot map]
    required_next_evidence: [SoC package specification, sustained workload power telemetry, thermal sensor hotspot data]
    risk_if_wrong: Thermal solution may be undersized or package adjacency may be invalid.
    review_priority: critical
  - domain: npu_sustained_performance
    coverage_status: weak
    maturity_level: screening
    models: [engineering/component_models/soc_package.py]
    data_sources: [engineering/constants/compute.yaml]
    key_assumptions: Sustained AI capability is inferred from power and package pressure, not benchmarked throughput.
    known_gaps: [No tokens-per-second model, no NPU compiler/runtime constraints, no thermal throttling curve]
    required_next_evidence: [Vendor NPU sustained benchmark, runtime kernel support matrix, long-duration inference telemetry]
    risk_if_wrong: Local AI performance claims may exceed realistic sustained behavior.
    review_priority: critical
  - domain: memory_capacity
    coverage_status: covered
    maturity_level: first_order
    models: [engineering/runtime_models/runtime_memory_budget.py, engineering/runtime_models/model_residency.py]
    data_sources: [specs/slate-pocket-v1.yaml, engineering/constants/compute.yaml]
    key_assumptions: Memory capacity is screened against model residency, OS reserve, multimodal overhead, and safety reserve.
    known_gaps: [No real runtime allocator traces, no model-specific fragmentation data, no concurrent app workload profile]
    required_next_evidence: [Runtime memory traces, target model bill of materials, OS and app memory telemetry]
    risk_if_wrong: Claimed local model sizes or multitasking targets may not fit in RAM.
    review_priority: high
  - domain: memory_package_density
    coverage_status: partial
    maturity_level: screening
    models: [engineering/component_models/memory_package.py, engineering/interconnect_models/package_interconnect.py]
    data_sources: [engineering/components/component_library.yaml, engineering/constants/compute.yaml]
    key_assumptions: Package area and density use generic LPDDR/package assumptions.
    known_gaps: [No selected memory part, no package-on-package constraints, no thermal coupling to SoC]
    required_next_evidence: [Memory package datasheet, selected SoC memory topology, board placement study]
    risk_if_wrong: Board area, stack height, and routing feasibility may be overstated.
    review_priority: high
  - domain: memory_bandwidth
    coverage_status: partial
    maturity_level: screening
    models: [engineering/interconnect_models/memory_bandwidth.py]
    data_sources: [engineering/constants/compute.yaml]
    key_assumptions: Bandwidth pressure is estimated from model size and workload class rather than validated kernel traces.
    known_gaps: [No measured bandwidth utilization, no cache behavior, no model-specific prefill/decode split]
    required_next_evidence: [Runtime bandwidth profiling, memory subsystem datasheet, model-specific throughput characterization]
    risk_if_wrong: Performance bottlenecks may be misattributed to compute instead of memory bandwidth.
    review_priority: high
  - domain: kv_cache_memory
    coverage_status: covered
    maturity_level: first_order
    models: [engineering/runtime_models/kv_cache.py, engineering/runtime_models/context_scaling.py]
    data_sources: [engineering/constants/compute.yaml]
    key_assumptions: KV cache is computed from model dimensions, context length, precision, and batch assumptions.
    known_gaps: [No vendor-specific attention implementation, no paged-cache overhead, no multimodal token expansion trace]
    required_next_evidence: [Target runtime KV allocation traces, supported context policy, model architecture metadata]
    risk_if_wrong: Long-context local AI claims may exceed available memory.
    review_priority: high
  - domain: storage_power
    coverage_status: weak
    maturity_level: screening
    models: [engineering/component_models/storage_package.py, engineering/models/component_power_budget.py]
    data_sources: [engineering/components/component_library.yaml]
    key_assumptions: Storage power is represented as a coarse component budget rather than workload-specific NAND/UFS behavior.
    known_gaps: [No selected storage datasheet, no read/write duty cycle, no thermal throttling data]
    required_next_evidence: [Storage electrical datasheet, model-load read profile, write endurance and thermal profile]
    risk_if_wrong: Model load time, thermal spikes, and battery drain may be underestimated.
    review_priority: medium
  - domain: storage_package_density
    coverage_status: partial
    maturity_level: screening
    models: [engineering/component_models/storage_package.py, engineering/models/component_packaging.py]
    data_sources: [engineering/components/component_library.yaml]
    key_assumptions: Package footprint and capacity density are estimated from generic component classes.
    known_gaps: [No selected package outline, no board keep-out, no thermal and shielding allowance]
    required_next_evidence: [Storage package drawing, PCB placement study, supplier capacity-package options]
    risk_if_wrong: Storage may crowd routing, thermal spreaders, or camera/antenna zones.
    review_priority: medium
  - domain: pcb_area_pressure
    coverage_status: covered
    maturity_level: first_order
    models: [engineering/component_models/pcb_stack.py, engineering/models/component_packaging.py]
    data_sources: [engineering/components/component_library.yaml]
