    known_gaps: [No actual board outline, no keep-outs, no connector/fastener/test-point placement]
    required_next_evidence: [Preliminary PCB floorplan, connector and keep-out map, DFM feedback]
    risk_if_wrong: Internal packaging may require thickness, footprint, or feature tradeoffs.
    review_priority: high
  - domain: pcb_layer_count
    coverage_status: partial
    maturity_level: screening
    models: [engineering/component_models/pcb_stack.py]
    data_sources: [engineering/components/component_library.yaml]
    key_assumptions: Layer count is inferred from complexity class and high-speed routing pressure.
    known_gaps: [No stackup from PCB vendor, no impedance control plan, no via structure definition]
    required_next_evidence: [Board stackup proposal, impedance and HDI design rules, fabricator capability review]
    risk_if_wrong: Board thickness, cost, yield, and routing feasibility may be misestimated.
