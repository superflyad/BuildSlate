identity:
  product_name:
    unit: text
    description: product name used as a first-order hardware tradeoff input.
    used_by_models: &id001
    - all traceability and review workflows
    required_for_feasibility_review: true
  device_class:
    unit: text
    description: device class used as a first-order hardware tradeoff input.
    used_by_models: *id001
    required_for_feasibility_review: true
