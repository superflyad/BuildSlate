  - id: slate_250g_mass_target
    name: Slate 250 g mass target
    value_or_range: 250
    units: g
    category: conceptual_extrapolation
    confidence: low
    used_by:
      - mass_budget
      - specs
      - dimensional_constraints
    rationale: Captures the source-intent mass target for a pocketable device with high local AI capability.
    limitations: Battery capacity, chassis stiffness, display size, camera hardware, thermal hardware, shielding, and manufacturing allowances may exceed this target.
    future_validation: Replace with CAD-derived mass rollup, supplier part masses, and measured prototype mass.
    source_notes:
      source_type: concept target
      citation_status: needs external citation
      notes:
        - High-risk target until reconciled with the full bill of materials.

  - id: slate_320g_engineering_mass_estimate
    name: Slate 320 g engineering mass estimate
    value_or_range: 320
    units: g
    category: modeled_estimate
    confidence: low
    used_by:
      - mass_budget
      - feasibility_flags
    rationale: Provides a more conservative engineering estimate when concept targets are reconciled with battery, structure, thermal, and display mass pressure.
    limitations: Still lacks CAD geometry, supplier mass data, detailed PCB population, adhesive mass, fastener count, and manufacturing tolerances.
    future_validation: Replace with CAD mass properties, supplier quotes, and prototype weigh-ins.
    source_notes:
      source_type: engineering estimate
      citation_status: needs external citation
      notes:
        - Screening estimate; should be superseded by a part-level mass budget.
