# Material constants for first-pass mass, thermal, structural, RF, and packaging estimates.
# Values are conservative approximate ranges for screening only, not vendor data.
# Use min/typical/max instead of fake precision when alloy, grade, stackup, or process variation matters.
materials:
  aluminum_alloy:
    density_g_cm3: {min: 2.65, typical: 2.70, max: 2.85}
    thermal_conductivity_w_mk: {min: 120, typical: 170, max: 230}
    specific_heat_j_gk: {min: 0.85, typical: 0.90, max: 0.95}
    cte_per_c: {min: 0.000021, typical: 0.000023, max: 0.000025}
    notes:
      - Good phone-scale heat spreading and mature machining/forming.
      - Conductive and RF-hostile without antenna breaks, windows, or isolation.
  magnesium_alloy:
    density_g_cm3: {min: 1.70, typical: 1.80, max: 1.90}
    thermal_conductivity_w_mk: {min: 50, typical: 75, max: 110}
    specific_heat_j_gk: {min: 0.95, typical: 1.00, max: 1.05}
    cte_per_c: {min: 0.000024, typical: 0.000026, max: 0.000028}
    notes:
      - Lightweight structural candidate with lower stiffness than aluminum.
      - Needs corrosion protection and manufacturing controls for chip/dust fire risk.
  titanium_alloy:
    density_g_cm3: {min: 4.40, typical: 4.50, max: 4.60}
    thermal_conductivity_w_mk: {min: 6, typical: 8, max: 22}
    specific_heat_j_gk: {min: 0.50, typical: 0.53, max: 0.56}
    notes:
      - Strong premium metal, but relatively dense and poor as a passive heat spreader.
      - Conductive housing remains an RF challenge.
  stainless_steel:
    density_g_cm3: {min: 7.70, typical: 7.90, max: 8.10}
    thermal_conductivity_w_mk: {min: 14, typical: 16, max: 25}
    specific_heat_j_gk: {min: 0.45, typical: 0.50, max: 0.55}
    notes:
      - High stiffness and strength but heavy for large phone-class enclosure volume.
      - Thermal spreading is much weaker than aluminum or copper.
  copper:
    density_g_cm3: {min: 8.80, typical: 8.96, max: 9.00}
    thermal_conductivity_w_mk: {min: 300, typical: 390, max: 410}
    specific_heat_j_gk: {min: 0.37, typical: 0.39, max: 0.40}
    cte_per_c: {min: 0.000016, typical: 0.000017, max: 0.000018}
    notes:
      - Excellent local heat and electrical conductor.
      - Too dense for broad structural shells; useful in vapor chambers, shields, and coils.
  graphite_sheet:
    density_g_cm3: {min: 1.6, typical: 2.0, max: 2.3}
    thermal_conductivity_w_mk: {min: 300, typical: 900, max: 1700}
    specific_heat_j_gk: {min: 0.65, typical: 0.75, max: 0.85}
    cte_per_c: {min: 0.000001, typical: 0.000004, max: 0.000008}
    notes:
      - Highly anisotropic; listed conductivity is in-plane screening range.
      - Conductive sheets can interact with RF keepouts and require insulation.
  ceramic:
    density_g_cm3: {min: 3.2, typical: 3.9, max: 6.1}
    thermal_conductivity_w_mk: {min: 2, typical: 25, max: 35}
    specific_heat_j_gk: {min: 0.40, typical: 0.80, max: 0.95}
    cte_per_c: {min: 0.000004, typical: 0.000007, max: 0.000010}
    notes:
      - Broad class covering zirconia/alumina-like materials; validate exact grade.
      - RF-friendly relative to metals but impact, brittleness, cost, and mass can dominate.
  glass:
    density_g_cm3: {min: 2.35, typical: 2.50, max: 2.80}
    thermal_conductivity_w_mk: {min: 0.8, typical: 1.2, max: 4.0}
    specific_heat_j_gk: {min: 0.75, typical: 0.85, max: 0.95}
    cte_per_c: {min: 0.000003, typical: 0.0000085, max: 0.000010}
    notes:
      - Useful for cover glass, rear glass, and RF/wireless charging transparency.
      - Poor passive heat spreader and sensitive to edges, impacts, and bonding stresses.
  polymer:
    density_g_cm3: {min: 0.90, typical: 1.20, max: 1.50}
    thermal_conductivity_w_mk: {min: 0.15, typical: 0.25, max: 0.40}
    specific_heat_j_gk: {min: 1.0, typical: 1.4, max: 1.8}
    notes:
      - RF-friendly relative to metals and useful for antenna windows, gaskets, and inserts.
      - Poor passive heat spreader; exact behavior depends on resin, fillers, reinforcement, and coating.
  pcb_assembly:
    density_g_cm3: {min: 1.60, typical: 1.90, max: 2.20}
    thermal_conductivity_w_mk: {min: 0.3, typical: 1.0, max: 5.0}
    specific_heat_j_gk: {min: 0.8, typical: 1.0, max: 1.2}
    cte_per_c: {min: 0.000012, typical: 0.000016, max: 0.000020}
    notes:
      - Assembly density and conductivity depend on copper weight, layer count, packages, shields, vias, and stiffeners.
      - Treat as an assembly property until board stackup and placement are known.
  battery_pack:
    density_g_cm3: {min: 2.3, typical: 2.7, max: 3.2}
    thermal_conductivity_w_mk: {min: 0.2, typical: 1.0, max: 3.0}
    specific_heat_j_gk: {min: 0.8, typical: 1.0, max: 1.3}
    notes:
      - Pack-level apparent density includes cell, tabs, pouch/can, protection, compression pads, and allowances.
      - Thermal behavior is directional and safety-limited; do not treat battery as a simple structural heat spreader.
# Legacy scalar keys retained for older models and notebooks that read direct density constants.
magnesium_alloy_density_g_cm3: 1.80
aluminum_alloy_density_g_cm3: 2.70
copper_density_g_cm3: 8.96
graphite_density_g_cm3: 2.00
ceramic_density_g_cm3:
  conservative: 6.10
  nominal: 3.90
  aggressive: 3.20
pcb_assembly_density_g_cm3:
  conservative: 2.20
  nominal: 1.90
  aggressive: 1.60
notes:
  - Finished-part density can differ from raw material density because of coatings, fasteners, adhesives, voids, and structural ribs.
  - PCB assembly density depends on copper weight, layer count, shielding, package mix, underfill, and local stiffeners.
  - Material constants are screening values; vendor data and measured stackups supersede them.
  - CTE constants are typical linear screening values; exact alloy, glass, ceramic, PCB stackup, graphite orientation, and adhesive compliance can dominate thermal expansion mismatch.
