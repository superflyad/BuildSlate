    known_gaps: [No CFD/FEA, no measured enclosure temperatures, no workload power distribution]
    required_next_evidence: [Thermal simulation, prototype thermocouple map, sustained workload power profile]
    risk_if_wrong: Skin temperature and throttling behavior may be materially worse than predicted.
