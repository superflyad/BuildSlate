  - domain: power_integrity
    coverage_status: weak
    maturity_level: screening
    models: [engineering/interconnect_models/power_integrity.py]
    data_sources: [engineering/constants/compute.yaml]
    key_assumptions: Voltage droop and transient margin are coarse screens without board parasitics.
    known_gaps: [No PDN impedance model, no decoupling placement, no load-step measurement, no package parasitics]
    required_next_evidence: [PDN simulation, oscilloscope load-step validation, decoupling BOM and placement review]
    risk_if_wrong: Sustained and burst AI loads may be unstable even if average power appears acceptable.
