entries:
  - id: lithium_ion_nominal_voltage
    category: industry_reference
    description: Nominal voltage used for first-pass lithium-ion battery energy conversion.
    applies_to:
      - battery_energy
      - dimensional_constraints
    confidence: high
    notes: Typical single-cell lithium-ion nominal voltage is used until pack-specific cell data is selected.
  - id: battery_energy_density
    category: industry_reference
    description: Volumetric energy density range used to estimate battery pack volume.
    applies_to:
      - battery_pack
      - dimensional_constraints
    confidence: medium
    notes: Pack-level density depends on cell chemistry, pouch geometry, protection, tabs, swelling allowance, and supplier data.
  - id: passive_pocket_power_limit
    category: modeled_estimate
    description: Conservative sustained passive heat rejection limit for phone-class pocket hardware.
    applies_to:
      - thermal_limits
      - thermal_module
      - thermal_resistance_network
    confidence: low
    notes: Strongly dependent on surface area, skin material, ambient conditions, user grip, workload transients, and throttling policy.
  - id: aluminum_thermal_conductivity
    category: industry_reference
    description: Aluminum alloy thermal conductivity placeholder for first-pass frame heat spreading.
    applies_to:
      - material_compare
      - composite_chassis
      - thermal_resistance_network
    confidence: medium
    notes: Exact value varies widely by alloy, temper, manufacturing process, and coating stack.
  - id: magnesium_density
    category: industry_reference
    description: Magnesium alloy density placeholder for chassis mass screening.
    applies_to:
      - material_compare
      - mass_budget
    confidence: medium
    notes: Supplier alloy choice and structural geometry are required before treating this as a design value.
  - id: graphite_in_plane_conductivity
    category: industry_reference
    description: In-plane thermal conductivity placeholder for graphite sheet heat spreading.
    applies_to:
      - thermal_module
      - thermal_resistance_network
    confidence: medium
    notes: Graphite is anisotropic; through-thickness conductivity and contact quality can be much lower than in-plane values.
  - id: vapor_chamber_effective_conductivity
    category: modeled_estimate
    description: Effective conductivity simplification for a copper vapor chamber heat spreader.
    applies_to:
      - thermal_module
      - thermal_resistance_network
    confidence: low
    notes: Effective vapor chamber performance is geometry-, orientation-, wick-, fluid-, and heat-load-dependent and is not bulk copper conductivity.
  - id: 512gb_lpddr6x_package_assumption
    category: conceptual_extrapolation
    description: Placeholder assumption for very high capacity mobile memory package feasibility.
    applies_to:
      - memory_package
      - soc_memory_zone
    confidence: low
    notes: Requires supplier roadmap evidence, package dimensions, signal integrity review, power data, and thermal validation.
  - id: 100tops_npu_sustained_assumption
    category: unresolved_research_blocker
    description: Assumption that a phone-class NPU can sustain 100 TOPS-class workloads within passive constraints.
    applies_to:
      - soc_package
      - thermal_resistance_network
      - thermal_limits
    confidence: low
    notes: Sustained performance depends on process node, workload sparsity, memory bandwidth, power management, cooling, and skin-temperature limits.
  - id: 6000mah_battery_target
    category: conceptual_extrapolation
    description: Source-intent battery capacity target for a thin pocket device.
    applies_to:
      - battery_pack
      - dimensional_constraints
    confidence: low
    notes: Must be reconciled with pack volume, swelling allowance, safety margins, mass, and local z-height constraints.
  - id: 8_8mm_chassis_target
    category: conceptual_extrapolation
    description: Source-intent chassis thickness target used for stackup screening.
    applies_to:
      - structural_stackup
      - zone_stackup
      - dimensional_constraints
    confidence: low
    notes: Local zones may fail even if a global thickness target appears plausible; CAD and tolerance analysis are required.
  - id: 250g_mass_target
    category: conceptual_extrapolation
    description: Source-intent mass target for the pocket device.
    applies_to:
      - mass_budget
      - dimensional_constraints
    confidence: low
    notes: Needs reconciliation with battery size, chassis stiffness, display size, camera hardware, thermal mass, and manufacturing constraints.
  - id: lpddr_bandwidth_assumption
    category: modeled_estimate
    description: Peak LPDDR-class bandwidth placeholder used for first-pass AI memory bandwidth screening.
    applies_to:
      - memory_bandwidth
      - package_interconnect
    confidence: low
    notes: Real sustained bandwidth depends on memory generation, channel width, package topology, controller efficiency, thermals, workload locality, and software stack.
  - id: high_speed_routing_density
    category: modeled_estimate
    description: Routing density proxy for high-speed internal links in a constrained phone-class PCB area.
    applies_to:
      - routing_density
      - package_interconnect
    confidence: low
    notes: Requires board floorplanning, layer stack definition, impedance rules, via strategy, length matching, and signal-integrity simulation before design use.
  - id: thin_device_pdn_constraint
    category: modeled_estimate
    description: First-order power delivery constraint for high-current rails in a thin pocket device.
    applies_to:
      - power_delivery
      - power_integrity
    confidence: low
    notes: PMIC selection, VRM placement, battery protection, connector limits, copper geometry, decoupling, and thermal limits can dominate the real constraint.
  - id: transient_current_factor
    category: modeled_estimate
    description: Conservative multiplier for fast workload-step current spikes in low-voltage AI compute rails.
    applies_to:
      - power_integrity
    confidence: low
    notes: Real transient current depends on workload, clock and power gating, package parasitics, regulator response, decoupling network, and board layout.
  - id: ai_memory_bandwidth_requirement
    category: unresolved_research_blocker
    description: Placeholder requirement linking local AI token targets to memory bandwidth demand.
    applies_to:
      - memory_bandwidth
      - soc_package
    confidence: low
    notes: This is not an inference-performance claim; KV cache, scheduling, NPU efficiency, runtime software, memory latency, batching, and sparsity must be validated separately.

  - id: kv_cache_formula
    category: modeled_estimate
    description: First-pass local LLM KV cache memory formula using keys plus values across layers, hidden size, context length, batch size, and element size.
    applies_to:
      - kv_cache
      - runtime_memory_budget
      - context_scaling
    confidence: medium
    notes: Architecture details such as grouped-query attention, paged cache layouts, cache compression, and runtime implementation can materially change realized cache memory.
  - id: context_length_assumption
    category: conceptual_extrapolation
    description: Context lengths used to screen long-context local AI runtime memory pressure.
    applies_to:
      - context_scaling
      - kv_cache
      - runtime_memory_budget
    confidence: low
    notes: Longer contexts are memory-expensive and depend on model architecture, attention implementation, prompt workload, batching, and runtime cache management.
  - id: multimodal_overhead_assumption
    category: modeled_estimate
    description: Placeholder additive resident memory overhead for vision, speech, embedding, vector-index, and runtime-reserve components.
    applies_to:
      - multimodal_overhead
      - runtime_memory_budget
    confidence: low
    notes: Actual resident memory depends on concrete model choices, precision, runtime sharing, lazy loading, vector index size, and concurrent workload policy.
  - id: model_load_bandwidth_assumption
    category: modeled_estimate
    description: First-pass model cold-load timing assumption based on local storage bandwidth and runtime overhead factors.
    applies_to:
      - model_load_time
      - runtime_memory_budget
    confidence: low
    notes: Storage bandwidth is theoretical rather than guaranteed sustained; filesystem behavior, decompression, allocation, thermal state, and concurrent I/O can increase load time.
  - id: runtime_memory_reserve_assumption
    category: modeled_estimate
    description: Placeholder OS and safety memory reserves used in combined local AI runtime budget screening.
    applies_to:
      - runtime_memory_budget
      - model_residency
      - multimodal_overhead
    confidence: low
    notes: Reserve requirements depend on operating system, runtime implementation, allocator behavior, background services, memory fragmentation, and workload concurrency.
  - id: tolerance_stackup_assumption
    category: modeled_estimate
    description: Conservative first-pass dimensional tolerance accumulation for stacked thin-device components.
    applies_to:
      - tolerance_stackup
      - structural_stackup
      - zone_stackup
    confidence: low
    notes: Actual assembly variation depends on part drawings, process capability, fixturing, adhesive compression, fastener preload, flatness, and measured distributions.
  - id: battery_swelling_assumption
    category: modeled_estimate
    description: Battery swelling clearance allowance used to screen pressure on adjacent displays, housings, and thermal stacks.
    applies_to:
      - battery_swelling
      - battery_pack
      - structural_stackup
    confidence: low
    notes: Swelling behavior depends on cell chemistry, age, state of charge, thermal history, charge policy, mechanical preload, and supplier safety requirements.
  - id: thermal_expansion_coefficients
    category: modeled_estimate
    description: Typical material CTE constants used for first-pass bonded-interface thermal expansion mismatch screening.
    applies_to:
      - thermal_expansion
      - material_screen
      - composite_chassis
    confidence: low
    notes: Exact CTE depends on alloy, glass type, ceramic grade, PCB stackup, graphite orientation, adhesives, constraints, temperature range, and aging.
  - id: thin_device_yield_pressure
    category: conceptual_extrapolation
    description: Assumption that sub-9 mm integrated device packaging increases manufacturing sensitivity and yield pressure.
    applies_to:
      - yield_risk
      - assembly_complexity
      - tolerance_stackup
    confidence: low
    notes: This is a qualitative pressure indicator only; real yield requires production process data, inspection results, supplier capability, and factory ramp evidence.
  - id: assembly_complexity_model
    category: modeled_estimate
    description: Weighted score for manufacturing pressure from component count, PCB layers, camera modules, antenna windows, thermal stack layers, and repairability target.
    applies_to:
      - assembly_complexity
      - yield_risk
    confidence: low
    notes: The score is comparative and should not be interpreted as cycle time, cost, defect probability, or factory yield.
  - id: repairability_tradeoff_assumption
    category: conceptual_extrapolation
    description: Assumption that thin bonded assemblies, adhesives, buried batteries, and stacked thermal paths increase repairability pressure.
    applies_to:
      - repairability
      - assembly_complexity
      - reliability_hotspots
    confidence: low
    notes: Serviceability depends on mechanical design, adhesive choices, access sequence, tools, manuals, spare parts, and authorized repair process constraints.
